name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
          - visual

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ vars.BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: ${{ github.event.inputs.project != 'visual' }}
        run: npx playwright install --with-deps

      - name: Run regression tests (chromium/firefox/webkit)
        if: ${{ github.event.inputs.project != 'visual' }}
        run: |
          if [ "${{ github.event.inputs.project }}" = "all" ]; then
            npx playwright test --project=chromium --project=firefox --project=webkit
          else
            npx playwright test --project=${{ github.event.inputs.project }}
          fi

      - name: Run visual tests (Docker)
        if: ${{ github.event.inputs.project == 'visual' || github.event.inputs.project == 'all' }}
        run: docker compose run --rm playwright npx playwright test --project=visual

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
